<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">TMPO framework overview</title>
  <desc id="desc">A pipeline diagram showing prompt conditioned shared-prefix tree sampling, reward scoring, Softmax Trajectory Balance, and LoRA policy update.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 36px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #f8fafc; }
      .small { font: 500 14px Arial, Helvetica, sans-serif; fill: #cbd5e1; }
      .tiny { font: 600 12px Arial, Helvetica, sans-serif; fill: #94a3b8; letter-spacing: .02em; }
      .card { fill: rgba(15, 23, 42, .86); stroke: #334155; stroke-width: 1.5; filter: url(#softShadow); }
      .line { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .tree { stroke: #38bdf8; stroke-width: 2.2; fill: none; opacity: .88; }
      .ghost { stroke: #475569; stroke-width: 1.2; fill: none; opacity: .45; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="150" fill="#1d4ed8" opacity="0.13"/>
  <circle cx="190" cy="520" r="180" fill="#be123c" opacity="0.11"/>
  <text x="64" y="70" class="title">TMPO: Trajectory Matching Policy Optimization</text>
  <text x="64" y="102" class="subtitle">Mode-covering reward distribution matching for diverse and efficient diffusion alignment</text>

  <rect x="64" y="158" width="190" height="120" rx="14" class="card"/>
  <text x="88" y="194" class="tiny">INPUT</text>
  <text x="88" y="225" class="label">Prompt</text>
  <text x="88" y="252" class="small">One text condition</text>

  <path class="line" d="M254 218 C290 218 304 218 332 218"/>

  <rect x="332" y="128" width="300" height="250" rx="18" class="card"/>
  <text x="360" y="166" class="tiny">DYNAMIC STOCHASTIC TREE SAMPLING</text>
  <text x="360" y="198" class="label">Shared prefix + 3 split levels</text>
  <text x="360" y="226" class="small">Branch factor k=3, up to 27 terminal paths</text>
  <path class="tree" d="M394 322 L452 278 L510 238"/>
  <path class="tree" d="M452 278 L512 278"/>
  <path class="tree" d="M452 278 L510 318"/>
  <path class="tree" d="M394 322 L452 322 L512 322"/>
  <path class="tree" d="M394 322 L452 366 L510 406"/>
  <path class="tree" d="M452 366 L512 366"/>
  <path class="ghost" d="M512 238 L584 206"/>
  <path class="ghost" d="M512 238 L584 238"/>
  <path class="ghost" d="M512 238 L584 270"/>
  <path class="ghost" d="M512 322 L584 300"/>
  <path class="ghost" d="M512 322 L584 322"/>
  <path class="ghost" d="M512 322 L584 344"/>
  <path class="ghost" d="M512 406 L584 374"/>
  <path class="ghost" d="M512 406 L584 406"/>
  <path class="ghost" d="M512 406 L584 438"/>
  <circle cx="394" cy="322" r="10" fill="url(#cyan)"/>
  <circle cx="452" cy="278" r="8" fill="#38bdf8"/>
  <circle cx="452" cy="322" r="8" fill="#38bdf8"/>
  <circle cx="452" cy="366" r="8" fill="#38bdf8"/>
  <text x="360" y="356" class="small">SDE noise only at branch points</text>

  <path class="line" d="M632 252 C662 252 686 252 716 252"/>

  <rect x="716" y="158" width="190" height="160" rx="16" class="card"/>
  <text x="744" y="196" class="tiny">SCORING</text>
  <text x="744" y="228" class="label">Reward models</text>
  <text x="744" y="256" class="small">HPSv2, PickScore,</text>
  <text x="744" y="280" class="small">ImageReward, GenEval, OCR</text>

  <path class="line" d="M906 238 C934 238 952 238 982 238"/>

  <rect x="982" y="128" width="234" height="220" rx="18" class="card"/>
  <text x="1012" y="166" class="tiny">DISTRIBUTION MATCHING</text>
  <text x="1012" y="198" class="label">Softmax-TB</text>
  <text x="1012" y="226" class="small">Match policy trajectory</text>
  <text x="1012" y="250" class="small">probabilities to</text>
  <text x="1012" y="274" class="small">exp(beta * reward)</text>
  <rect x="1012" y="298" width="152" height="12" rx="6" fill="#334155"/>
  <rect x="1012" y="298" width="118" height="12" rx="6" fill="url(#red)"/>
  <text x="1012" y="328" class="tiny">PARTITION-FREE GROUP NORMALIZATION</text>

  <path class="line" d="M1098 348 C1098 438 936 460 810 460 C650 460 526 438 526 390"/>

  <rect x="382" y="430" width="260" height="120" rx="16" class="card"/>
  <text x="410" y="468" class="tiny">POLICY UPDATE</text>
  <text x="410" y="500" class="label">LoRA / full-param update</text>
  <text x="410" y="528" class="small">Clipped IS + reference constraint</text>

  <rect x="724" y="410" width="280" height="120" rx="16" class="card"/>
  <text x="752" y="448" class="tiny">TRAINING SIGNAL</text>
  <text x="752" y="480" class="label">Mode-covering advantage</text>
  <text x="752" y="508" class="small">Preserves multiple acceptable outputs</text>

  <rect x="64" y="470" width="210" height="78" rx="14" fill="rgba(15,23,42,.72)" stroke="#334155"/>
  <text x="88" y="503" class="label">Reported gains</text>
  <text x="88" y="530" class="small">+9.1% average diversity, up to 27% faster</text>
</svg>
