# Flux.1-dev LoRA 训练配置 (8×H200)

model:
  # 本地路径 (绝对路径, 直接指向别的目录的模型)
  pretrained_path: "/home/zhaxianyu/sunli/models/flux.1-dev/"
  vae_path: null
  guidance_scale: 3.5          # Flux.1-dev 是 guidance-distilled, rollout/recompute 需保持一致
  lora:
    rank: 64                   # 勇气展开 8卡, 每卡显存充裕 → rank 64
    alpha: 128                 # 提高 LoRA 有效缩放(alpha/rank=2), 增强参数位移
    target_modules: ["to_q", "to_k", "to_v", "to_out.0",
                     "add_q_proj", "add_k_proj", "add_v_proj", "to_add_out",
                     "ff.net.0.proj", "ff.net.2",
                     "ff_context.net.0.proj", "ff_context.net.2"]   # 对齐 FlowGRPO, 额外放开 FFN / context FFN
    dropout: 0.0

dataset:
  data_json_path: "/home/zhaxianyu/lijiaming08/prompts_2k.jsonl"
  resolution: [512, 512]

tree:
  num_inference_steps: 28
  k: 3                           # 提升为 27 分支, 增强路径概率差异信号
  base_noise_levels: [0.6, 0.9, 1.2]
  kappa: 4.0
  shift: 3.0
  tail_guard_steps: 4            # 防止最后一个分叉贴近尾部小 sigma 区域导致梯度奇异
  force_fixed_schedule: true
  fixed_split_steps: [3, 8, 13]
  fixed_noise_levels: [0.6, 0.9, 1.2]

dpm_flash:
  enabled: true
  compress_ratio: 0.4
  solver_order: 2
  solver_type: "midpoint"

loss:
  beta: 3.0              # warm-up 起始值; 线性升至 beta_target
  beta_target: 5.0       # 降低 Softmax-TB 目标尖锐度, 避免 TB 长期压制有效策略位移
  beta_warmup_steps: 20  # 仍保留短 warm-up, 但峰值温度改为更温和的 5.0
  lambda_entropy: 1.0    # 提高熵项在总损失中的有效权重
  lambda_ref: 0.01       # 当前 ref 实际约束的是“别离 rollout 旧策略太远”, 先显著减弱回拉
  ref_scale: 1.0         # 恢复 ref 到正常量级, 避免直接把 approx_kl 压回接近 0
  is_clip_range: 0.2     # 收紧 IS 权重裁剪/诊断阈值, 让 clipfrac 和 ratio 更敏感
  is_num_updates: 12     # 同一批 rollout 多做几次更新, 提高 current vs old 的位移量
  rbf_bandwidth: 50.0      # 提高熵项有效量级, 避免长期近零
  adv_clip_max: 5.0

reward:
  models: ["hpsv2", "clipscore"]
  weights: [0.6, 0.4]
  mix_strategy: "advantage_aggr"
  hps_path: "/home/zhaxianyu/lijiaming08/reward_ckpt/HPS_v2.1_compressed.pt"
  hps_clip_path: "/home/zhaxianyu/lijiaming08/reward_ckpt/open_clip_pytorch_model.bin"
  clip_score_path: "/home/zhaxianyu/lijiaming08/reward_ckpt/clip_score"

training:
  learning_rate: 2e-4         # 10x 提升(相对 2e-5), 直接测试是否打破策略停滞
  max_grad_norm: 20.0         # 放宽裁剪, 避免 grad_norm 长期被 1.0 强行压扁
  weight_decay: 0.0001
  keep_lora_fp32: false        # FSDP flatten 需统一 dtype; mixed bf16/fp32 会在 prepare 报错
  sanitize_lora_grad: true     # 保留 NaN/Inf 清洗
  lora_grad_clip: 0.0          # 关闭逐元素 clamp, 改由全局 max_grad_norm 控制梯度
  gradient_accumulation_steps: 1
  max_train_steps: 500
  checkpointing_steps: 50
  save_state: true           # 使用 accelerate.save_state 保存分布式分片 state
  save_state_steps: 200      # full state 更重, 低频保存
  save_optimizer: false      # LoRA 场景只存 adapter shards, 避免 checkpoint 通信/I-O 超时
  mixed_precision: "bf16"
  gradient_checkpointing: false    # 关闭 model-level AC; 只用 FSDP-level AC 防止双层重算导致 bf16 NaN
  allow_tf32: true
  cudnn_safe_mode: true            # 屏蔽已知 cudnn plan fallback 警告并关闭 benchmark 刷屏
  seed: 88
  vae_decode_batch_size: 2
  recompute_sub_batch: 4   # SHARD_GRAD_OP 下峰值 ~100GB, 保留 4 确保安全
  output_dir: "/home/zhaxianyu/lijiaming08/outputs/flux_lora_8gpu"
  experiment_name: "treematch_flux_dev_8gpu"

debug:
  backprop_scale: 1.0         # 与 10x LR 配合, 先关闭额外放大以便隔离学习率效果
